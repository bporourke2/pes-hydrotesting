<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — Hydrotest Tool</title>
    <link rel="stylesheet" href="/static/shared.css">
    <style>
        body { justify-content: center; }
        .providers { width: 100%; max-width: 400px; }
        .provider-btn { display: block; width: 100%; padding: 14px 20px; margin-bottom: 12px; background: white; border: 1px solid var(--lt-border); border-radius: var(--radius-lg); font-size: 1em; font-weight: 600; color: var(--lt-text-primary); cursor: pointer; text-align: center; transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .provider-btn:hover { border-color: var(--color-green-600); box-shadow: 0 2px 8px rgba(39,174,96,0.15); }
        .provider-btn .type-tag { font-size: 0.72em; color: var(--lt-text-muted); font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body class="page-light">

<img src="/static/peslogo.png" alt="PES Logo" class="page-logo">
<h1 class="page-title">Sign In</h1>
<p class="page-subtitle">Choose an authentication provider</p>

<div class="providers">
    {% for p in providers %}
    <a href="{{ url_for('login', provider=p.id) }}" class="provider-btn">
        {{ p.name }}
        <br><span class="type-tag">{{ p.provider_type }}</span>
    </a>
    {% endfor %}
</div>

</body>
</html>
